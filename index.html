<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050b12" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SB Dash">

  <title>SB Dash</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="app">

    <div class="zenBlob startZen" aria-hidden="true"></div>
    <div class="ambientBlob" aria-hidden="true"></div>

    <div class="timerBarWrap" id="timerBarWrap" aria-hidden="true">
      <div class="timerBar" id="timerBar"></div>
    </div>

    <header class="topBar">
      <div class="clockBlock">
        <div class="clockDate" id="clockDate">MÅNDAG | 9 MARS</div>

        <div class="clockRow">
          <div class="clockTime" id="clockTime">22:14</div>

          <button class="timerIconBtn" id="timerIconBtn" type="button" aria-label="Öppna timer">
            <img src="assets/ui/icon-pomodoro.svg" alt="" draggable="false" />
          </button>
        </div>
      </div>

      <div class="weatherBlock" id="weatherBlock" aria-label="Väder">
        <img class="weatherIcon" id="weatherIcon" src="assets/ui/weather/na.svg" alt="" draggable="false" />
        <div class="weatherTemp" id="weatherTemp">--°</div>
      </div>
    </header>

    <div class="clockSeparator"></div>

    <main class="moduleArea" aria-label="Modulyta">
      <button class="moduleSlot moduleSlot--prio" id="moduleSlot1" type="button" aria-label="Öppna prio">
        <div class="prioPreview" id="prioPreview"></div>
      </button>

      <div class="moduleSlot moduleSlot--empty" id="moduleSlot2" aria-hidden="true"></div>

      <div class="moduleExpandOverlay" id="prioOverlay" aria-hidden="true">
        <div class="moduleExpandCard" id="prioCard" role="dialog" aria-modal="false" aria-label="Prio">
          <div class="prioPanelScroller">
            <div class="prioPanelList" id="prioPanelList"></div>
          </div>

          <div class="prioAddBar">
            <button class="prioCloseFab" id="prioCloseFab" type="button" aria-label="Stäng prio">✕</button>
            <div class="prioFakeCheck" aria-hidden="true"></div>
            <input
              class="prioAddInput"
              id="prioAddInput"
              type="text"
              maxlength="160"
              placeholder="Skriv ny prio..."
              autocomplete="off"
            />
            <button class="prioAddBtn" id="prioAddBtn" type="button" aria-label="Lägg till prio">+</button>
          </div>
        </div>
      </div>
    </main>

    <div class="timerFocus" id="timerFocus" aria-hidden="true">
      <div class="timerWheelWrap">
        <div class="timerWheel" id="timerWheel" aria-label="Timerhjul">
          <img class="timerWheelRing" id="timerWheelRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />

          <div class="timerWheelCenter">
            <div class="timerWheelTop" id="timerWheelTop">TIMER</div>
            <div class="timerWheelValue" id="timerWheelValue">5</div>
            <div class="timerWheelBottom" id="timerWheelBottom">MIN</div>
          </div>
        </div>
      </div>
    </div>

    <section class="calendarStrip" aria-label="Kalender">
      <div class="calendarFrameWrap">
        <iframe
          id="calendarFrame"
          src="https://calendar.google.com/calendar/embed?src=ZXJpY3Nzb25ib25pbmlAZ21haWwuY29t&mode=AGENDA&ctz=Europe%2FStockholm&hl=sv&bgcolor=%23ffffff&showTitle=0&showTabs=0&showNav=0&showPrint=0&showCalendars=0&showDate=0"
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>

        <div class="calendarShade"></div>
      </div>
    </section>

    <audio id="alarmAudio" preload="auto"></audio>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
