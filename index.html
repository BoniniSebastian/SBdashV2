<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050b12" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SB Dash">

  <title>SB Dash v2</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
  <div class="app">

    <!-- ICON RAIL (top row) -->
    <div class="ambientBlob" aria-hidden="true"></div>
    <div class="iconRail" id="iconRail" aria-label="Menyikoner"></div>

    <!-- Right-side timer bar -->
    <div class="timerBarWrap" id="timerBarWrap" aria-hidden="true">
      <div class="timerBar" id="timerBar"></div>
    </div>

    <!-- WHEEL (bottom-left, full visible) -->
    <div class="wheelWrap" id="wheelWrap">
      <div class="wheel" id="wheel">
        <!-- IMPORTANT: this must match your repo path -->
        <img class="wheelRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />
        <div class="wheelDot" id="wheelDot" aria-hidden="true"></div>
      </div>
    </div>

    <!-- SECTION SHEET -->
    <div class="sheetWrap" id="sheetWrap" aria-hidden="true">
      <div class="sheet" id="sheet" role="dialog" aria-modal="true">
        <div class="sheetHeader">
          <div class="sheetTitle" id="sheetTitle">—</div>
          <button class="sheetClose" id="sheetCloseBtn" type="button" aria-label="Stäng">✕</button>
        </div>
        <div class="sheetContent" id="sheetContent"></div>
        <div class="sheetHandle" aria-hidden="true"></div>
      </div>
    </div>

    <!-- TIMER OVERLAY -->
    <div class="overlayWrap" id="timerOverlay" aria-hidden="true">
      <div class="overlayCard">
        <div class="overlayTop">
          <div class="overlayTitle">TIMER</div>
          <button class="overlayClose" id="timerClose" type="button" aria-label="Stäng timer">✕</button>
        </div>

        <div class="timerBig" id="timerBig">00:00</div>
        <div class="timerSub" id="timerSub">Vrid hjulet: 1 / 5 / 10 / 15 / 20 / 30</div>

        <button class="ctaBtn" id="timerStartBtn" type="button">START</button>

        <div class="zenBlob" aria-hidden="true"></div>
      </div>
    </div>

    <!-- TOOLS OVERLAY -->
    <div class="overlayWrap" id="toolsOverlay" aria-hidden="true">
      <div class="overlayCard">

        <div class="overlayTop">
          <div class="overlayTitle">TOOLS</div>
          <button class="overlayClose" id="toolsClose" type="button" aria-label="Stäng tools">✕</button>
        </div>

        <!-- COUNTER MODE -->
        <div id="toolsCounterMode">
          <div class="toolsTopRow">
            <button class="toolsTxtBtn" id="guessOdd" type="button">UDDA</button>
            <button class="toolsTxtBtn" id="guessEven" type="button">JÄMNT</button>
            <button class="toolsTxtBtn" id="btn501" type="button">501</button>
          </div>

          <div class="fidgetCount" id="fidgetCount">0</div>

          <div class="toolsBottomRow">
            <button class="toolsTxtBtn ghost" id="fidgetReset" type="button">RESET</button>
          </div>

          <div class="miniHint" id="fidgetHint">Vrid hjulet → räknar oändligt. Slut-siffra avgör udda/jämnt.</div>
        </div>

        <!-- 501 MODE -->
        <div id="tools501Mode" hidden>
          <div class="toolsBackRow">
            <button class="toolsTxtBtn" id="btn501Back" type="button">← TILLBAKA</button>
          </div>

          <div class="dartWrap" id="dartWrap">
            <div class="dartGrid" id="dartGrid"></div>
          </div>

          <div class="miniHint">Vrid hjulet för poäng. Släpp → sparar rundan och hoppar till nästa spelare.</div>
        </div>

      </div>
    </div>

    <!-- optional alarm audio -->
    <audio id="alarmAudio" preload="auto"></audio>

  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
