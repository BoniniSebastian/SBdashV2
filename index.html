<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SBdash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
<div id="dateLine"></div>
<div id="timeLine"></div>
</header>

<div class="band" id="slots">

<section class="slot" id="slot1">

<div class="preview timerPreview" id="timerPreview">
<div class="timerCircle">
<div class="timerTop">TIMER</div>
<div class="timerValue" id="timerValue">5</div>
<div class="timerBottom">MIN</div>
</div>
<button id="timerReset" class="resetBtn">Reset</button>
</div>

<div class="preview prioPreview" id="prioPreview">
<h3>Prio</h3>
<div id="prioList"></div>
</div>

<div class="preview weatherPreview" id="weatherPreview">
<div class="weatherMain">
<img id="weatherIcon">
<div class="weatherTemp" id="weatherTemp"></div>
<div id="weatherDesc"></div>
</div>
<div class="weatherHours" id="weatherHours"></div>
</div>

</section>

<section class="slot" id="slot2">

<div class="preview freePreview">
<h3>Fritext</h3>
<textarea id="freeText"></textarea>
</div>

<div class="preview stocksPreview" id="stocksPreview"></div>

<div class="preview newsPreview" id="newsPreview"></div>

<div class="preview powerPreview" id="powerPreview"></div>

</section>

</div>

<div id="overlayStocks" class="overlay"></div>
<div id="overlayNews" class="overlay"></div>

<script src="app.js"></script>
</body>
</html>
