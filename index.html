<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SB Flip" />
  <title>SB Flip</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <div class="appShell" id="appShell">
    <div class="appBg"></div>

    <main class="viewport" id="viewport" aria-live="polite">
      <section class="surfaceLayer" id="surfaceLayer">
        <div class="surfacePage current" id="currentSurface"></div>
        <div class="surfacePage incoming" id="incomingSurface" aria-hidden="true"></div>
      </section>

      <section class="moduleLayer" id="moduleLayer" aria-hidden="true">
        <div class="moduleTrack" id="moduleTrack"></div>
      </section>
    </main>

    <nav class="bottomRail" id="bottomRail" aria-label="Navigation">
      <button class="homeBtn" id="homeBtn" type="button" aria-label="Hem">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4.75 10.5 12 4.5l7.25 6v8.75c0 .41-.34.75-.75.75h-4.75v-5.25h-3.5V20H5.5a.75.75 0 0 1-.75-.75V10.5Z"/>
        </svg>
      </button>
      <div class="railText" id="railText">HOME → NOTES</div>
    </nav>
  </div>

  <template id="tplHomeCard">
    <button class="homeCard" type="button">
      <div class="homeCardInner"></div>
    </button>
  </template>

  <template id="tplPreviewPage">
    <article class="previewPage">
      <div class="previewPageInner"></div>
    </article>
  </template>

  <script src="app.js?v=1"></script>
</body>
</html>
