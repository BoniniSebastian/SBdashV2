<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SB Dash</title>

<link rel="stylesheet" href="style.css?v=10.1">
</head>

<body>

<div class="app">

<header class="top">

<div class="date">
<span id="dateLine">Fredag | 13 Mars</span>
</div>

<div class="clock">
<span id="timeLine">10:11</span>
</div>

</header>

<section class="modules">

<div class="module prio">
<div class="glass">
<div class="prioPreview">

<div class="prioRow">
<div class="dot"></div>
<div class="text">Hämta bilen påvägen hem</div>
</div>

</div>
</div>
</div>

<div class="module weather">
<div class="weatherPreview">

<div class="weatherIcon">☁️</div>

<div class="weatherInfo">

<div class="temp">7°</div>
<div class="desc">Mulet</div>

<div class="extra">
Känns som 5°<br>
Regnrisk 40%
</div>

</div>

</div>
</div>

<div class="module freeText">
<div class="glass big">
<input placeholder="Fritext...">
</div>
</div>

<div class="module timer">

<div class="timerPreview">

<div class="timerCircle">

<div class="timerTop">TIMER</div>
<div class="timerValue">5</div>
<div class="timerBottom">MIN</div>

</div>

</div>

</div>

</section>

</div>

<script src="app.js?v=10.1"></script>

</body>
</html>
