<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050b12" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SB Dash">

  <title>SB Dash v2</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>

<body>
  <div class="app">
    <div class="zenBlob startZen" aria-hidden="true"></div>

    <!-- ICON RAIL (top row) -->
    <div class="ambientBlob" aria-hidden="true"></div>
    <div class="iconRail" id="iconRail" aria-label="Menyikoner"></div>

    <!-- Right-side timer bar -->
    <div class="timerBarWrap" id="timerBarWrap" aria-hidden="true">
      <div class="timerBar" id="timerBar"></div>
    </div>

   <!-- WHEEL -->
<div class="wheelWrap" id="wheelWrap">
  <div class="wheel" id="wheel">
    ...
  </div>
</div>

<!-- DATE PANEL -->
<div class="datePanel" aria-label="Datum">
  <div class="dpDay" id="dayName">—</div>
  <div class="dpDate" id="dateNumber">—</div>
  <div class="dpMonth" id="monthName">—</div>
</div>

        <!-- IMPORTANT: this must match your repo path -->
        <img class="wheelRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />

        <div class="wheelCenter" id="wheelCenter" aria-hidden="true">
          <div class="wcTop" id="wcTop">—</div>
          <div class="wcMain" id="wcMain">—</div>
          <div class="wcBot" id="wcBot">—</div>
        </div>

        <div class="wheelDot" id="wheelDot" aria-hidden="true"></div>
      </div>
    </div>

    <!-- SECTION SHEET -->
    <div class="sheetWrap" id="sheetWrap" aria-hidden="true">
      <div class="sheet" id="sheet" role="dialog" aria-modal="true">
        <div class="sheetHeader">
          <div class="sheetTitle" id="sheetTitle">—</div>
          <button class="sheetClose" id="sheetCloseBtn" type="button" aria-label="Stäng">✕</button>
        </div>
        <div class="sheetContent" id="sheetContent"></div>
        <div class="sheetHandle" aria-hidden="true"></div>
      </div>
    </div>

    <!-- TIMER OVERLAY -->
    <div class="overlayWrap" id="timerOverlay" aria-hidden="true">
      <div class="overlayCard">
        <div class="overlayTop">
          <div class="overlayTitle">TIMER</div>
          <button class="overlayClose" id="timerClose" type="button" aria-label="Stäng timer">✕</button>
        </div>

        <div class="timerBig" id="timerBig">00:00</div>
        <div class="timerSub" id="timerSub">Vrid hjulet: 1 / 5 / 10 / 15 / 20 / 30</div>

        <!-- TIMER WHEEL (normal) -->
        <div class="overlayWheelWrap">
          <div class="overlayWheel overlayWheel--normal" id="timerWheel" aria-label="Timer wheel">
            <img class="overlayWheelRing" id="timerRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />
          </div>
        </div>

        <button class="ctaBtn" id="timerStartBtn" type="button">START</button>

        <div class="zenBlob" aria-hidden="true"></div>
      </div>
    </div>

    <!-- TOOLS OVERLAY -->
    <div class="overlayWrap" id="toolsOverlay" aria-hidden="true">
      <div class="overlayCard">

        <div class="overlayTop">
          <div class="overlayTitle">TOOLS</div>
          <button class="overlayClose" id="toolsClose" type="button" aria-label="Stäng tools">✕</button>
        </div>

        <div class="toolsTopRow">
          <button class="toolsTxtBtn" id="guessOdd" type="button">UDDA</button>
          <button class="toolsTxtBtn" id="guessEven" type="button">JÄMNT</button>
          <button class="toolsTxtBtn" id="btn501" type="button">501</button>
        </div>

        <!-- SPINNER WHEEL (FAST) -->
        <div class="overlayWheelWrap">
          <div class="neonPointer" aria-hidden="true"></div>
          <div class="overlayWheel overlayWheel--spinner" id="toolsSpinnerWheel" aria-label="Tools spinner wheel">
            <img class="overlayWheelRing" id="toolsSpinnerRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />
            <div class="spinValue glitch" id="toolsSpinValue" data-text="0" aria-live="polite">0</div>
          </div>
        </div>

        <div class="toolsBottomRow">
          <button class="toolsTxtBtn ghost" id="fidgetReset" type="button">RESET</button>
        </div>

        <div class="miniHint" id="fidgetHint">
          Välj UDDA/JÄMNT → snurra hjulet → släpp. Resultatet visas i mitten.
        </div>

      </div>
    </div>

    <!-- DART 501 OVERLAY (separate) -->
    <div class="overlayWrap" id="dartOverlay" aria-hidden="true">
      <div class="overlayCard">

        <div class="overlayTop">
          <div style="display:flex; align-items:center; gap:10px;">
            <img src="assets/ui/icon-dart501.png" alt="" style="width:22px;height:22px;opacity:.95;" draggable="false"/>
            <div class="overlayTitle">501</div>
          </div>
          <button class="overlayClose" id="dartClose" type="button" aria-label="Stäng 501">✕</button>
        </div>

        <div class="overlayWheelWrap">
          <div class="overlayWheel overlayWheel--normal" id="dartWheel" aria-label="501 wheel">
            <img class="overlayWheelRing" id="dartRing" src="assets/ui/wheel-ring.svg" alt="" draggable="false" />
            <div class="spinValue" id="dartValue" data-text="0" aria-live="polite">0</div>
          </div>
        </div>

        <div class="dartWrap" id="dartWrap">
          <div class="dartGrid" id="dartGrid"></div>
        </div>

        <div class="miniHint">Vrid hjulet för poäng. Släpp → sparar rundan och hoppar till nästa spelare.</div>
      </div>
    </div>

    <!-- optional alarm audio -->
    <audio id="alarmAudio" preload="auto"></audio>

  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
