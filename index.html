<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050b12" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SB Dash" />

  <link rel="apple-touch-icon" href="assets/icon.png" />
  <link rel="icon" type="image/png" href="assets/icon.png" />

  <title>SB Dash</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <div class="app">
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <header class="topBar">
      <div class="topMeta">
        <div class="dayDate" id="dayDate">FREDAG · 13 MARS</div>
      </div>
    </header>

    <div class="line line--top" aria-hidden="true"></div>

    <main class="slots" aria-label="Slotar">
      <section class="slotSection" id="slotASection" aria-label="Slot A">
        <button class="sideRail sideRail--left" id="slotALeft" type="button" aria-label="Föregående modul i slot A"></button>

        <button class="slotButton" id="slotAButton" type="button" aria-label="Öppna modul i slot A">
          <div class="slotContent" id="slotAContent"></div>
        </button>

        <button class="sideRail sideRail--right" id="slotARight" type="button" aria-label="Nästa modul i slot A"></button>
      </section>

      <div class="line line--middle" aria-hidden="true"></div>

      <section class="slotSection" id="slotBSection" aria-label="Slot B">
        <button class="sideRail sideRail--left" id="slotBLeft" type="button" aria-label="Föregående modul i slot B"></button>

        <button class="slotButton" id="slotBButton" type="button" aria-label="Öppna modul i slot B">
          <div class="slotContent" id="slotBContent"></div>
        </button>

        <button class="sideRail sideRail--right" id="slotBRight" type="button" aria-label="Nästa modul i slot B"></button>
      </section>
    </main>

    <section class="calendarStrip" aria-label="Kalender">
      <div class="calendarFrameWrap">
        <iframe
          id="calendarFrame"
          src="https://calendar.google.com/calendar/embed?src=ZXJpY3Nzb25ib25pbmlAZ21haWwuY29t&mode=AGENDA&ctz=Europe%2FStockholm&hl=sv&bgcolor=%23ffffff&showTitle=0&showTabs=0&showNav=0&showPrint=0&showCalendars=0&showDate=0"
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
          title="Google Kalender"
        ></iframe>
        <div class="calendarFade" aria-hidden="true"></div>
      </div>
    </section>

    <div class="overlay" id="moduleOverlay" aria-hidden="true">
      <div class="overlayInner">
        <div class="overlayScroll" id="overlayScroll">
          <div class="overlayContent" id="overlayContent"></div>
        </div>

        <button class="closeFab" id="closeFab" type="button" aria-label="Stäng modul">✕</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
