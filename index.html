<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>SB Dash</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css?v=2" />
</head>

<body>

  <!-- ================= TOPBAR ================= -->
  <header class="topbar">
    <div class="brand">
      <div class="brandDot"></div>
      <div>
        <div class="brandTitle">SB Dash</div>
        <div class="brandSub">Control dashboard</div>
      </div>
    </div>

    <div class="topDate" id="topDate">—</div>

    <div class="topRight">
      <div class="topPrioMini">
        Aktiva prios: <span id="topPrioCount">0</span>
      </div>
    </div>
  </header>

  <!-- ================= APP SHELL ================= -->
  <div class="shell">

    <!-- ===== PREVIEW (visas endast när sheet är stängd) ===== -->
    <div class="previewWrap" id="previewWrap">
      <div class="previewCard">
        <div class="previewTitle" id="previewTitle">—</div>
        <div class="previewBody" id="previewBody"></div>
      </div>
    </div>

    <!-- ===== STOR STARTIKON (under preview) ===== -->
    <div class="startIconWrap" id="startIconWrap">
      <img
        class="startIcon"
        id="startIcon"
        src="assets/ui/icon-calendar.svg"
        alt="Startikon"
      />
    </div>

    <!-- ===== SHEET (öppnas bakom hjulet) ===== -->
    <div class="sheetWrap" id="sheetWrap" aria-hidden="true">
      <div
        class="sheet"
        id="sheet"
        role="dialog"
        aria-modal="true"
        aria-label="Panel"
      >

        <div class="sheetHeader">
          <div class="sheetTitle" id="sheetTitle">—</div>
          <button
            class="sheetClose"
            id="sheetCloseBtn"
            aria-label="Stäng panel"
          >
            ✕
          </button>
        </div>

        <div class="sheetContent" id="sheetContent">
          <!-- JS renderar innehåll här -->
        </div>

      </div>
    </div>

    <!-- ===== WHEEL ===== -->
    <div class="wheelWrap" id="wheelWrap" aria-label="Scrollhjul">
      <div class="wheel" id="wheel">

        <!-- Roterande ring -->
        <img
          src="assets/ui/knob-ring.svg"
          class="wheelRing"
          alt="Ring"
        />

        <!-- Text i hjulet -->
        <div
          id="wheelCenterText"
          class="wheelCenterText"
        >
          —
        </div>

        <!-- Timer SVG + Pulse injiceras av JS -->

      </div>
    </div>

  </div>

  <!-- ===== ALARM (valfri ljudfil) ===== -->
  <audio id="alarmAudio" preload="auto">
    <!-- Om du lägger alarm.mp3 i assets/sfx kan du aktivera:
    <source src="assets/sfx/alarm.mp3" type="audio/mpeg" />
    -->
  </audio>

  <!-- JS -->
  <script src="app.js?v=1"></script>

</body>
</html>
